# PRP-01: Cloudflare Pages Functions config.
# Correction (verified live 2026-07-16): Cloudflare Pages DOES read this file
# directly via its "Wrangler configuration file" build step -- the KV binding
# below is picked up automatically on every push, no manual dashboard binding
# needed. Only the GEMINI_API_KEY secret must be set manually in the dashboard
# (Pages project -> Settings -> Variables and secrets -> Add -> type "Secret"),
# since secrets are never stored in this file. See functions/README.md.
#
# Local dev:   npx wrangler pages dev . --kv RATE_KV

name = "muskanagarwal-dev"
pages_build_output_dir = "."
compatibility_date = "2024-09-01"

[[kv_namespaces]]
binding = "RATE_KV"
id = "6406634d75344850b00ad4d1c5fca6b9"
