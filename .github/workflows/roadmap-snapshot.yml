name: Monthly roadmap snapshot + GitHub stats refresh

# Runs on the 1st of every month: refreshes plans/roadmap.json lastActivity
# from the public GitHub API, saves a new monthly snapshot for the /plans/
# "rewind" slider, and refreshes the homepage's public-repos/stars stat.
# No secrets needed — every API call here is unauthenticated (public data),
# and the only write is a commit back to this same repo via the built-in
# GITHUB_TOKEN. If this workflow can't be enabled (Actions disabled on the
# repo), run the two scripts manually and upload the changed files via the
# GitHub web UI instead — see README.md.

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Update roadmap.json + monthly snapshot
        run: node scripts/update-roadmap.mjs
      - name: Update homepage GitHub stats
        run: node scripts/update-github-stats.mjs
      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plans/roadmap.json plans/snapshots/ index.html
          git diff --staged --quiet || git commit -m "chore: monthly roadmap snapshot + stats refresh"
          git push
